# =============================================================
# ALC Connect — Docker Compose de REFERÊNCIA para produção
# =============================================================
# Em produção (Coolify), cada serviço é deployado SEPARADAMENTE.
# Este arquivo serve apenas como documentação/referência.
# Para desenvolvimento local, use: docker-compose.dev.yml
# =============================================================

services:
  postgres:
    # No Coolify: criar como recurso "Database > PostgreSQL"
    # Isso dá acesso ao banco pelo painel, backups e métricas
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    # No Coolify: criar como "Application > Dockerfile"
    # Build context: apps/api
    # Domínio: https://api.alcconnect.com.br
    build:
      context: ./apps/api
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      EMAIL_TO: ${EMAIL_TO}
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      ASAAS_WEBHOOK_SECRET: ${ASAAS_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    # No Coolify: criar como "Application > Dockerfile"
    # Build context: apps/dashboard
    # Domínio: https://app.alcconnect.com.br
    # Build arg: VITE_API_URL=https://api.alcconnect.com.br
    build:
      context: ./apps/dashboard
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    expose:
      - "80"

  landing:
    # No Coolify: criar como "Application > Dockerfile"
    # Build context: apps/landing
    # Domínio: https://alcconnect.com.br
    build:
      context: ./apps/landing
    restart: unless-stopped
    expose:
      - "80"

volumes:
  pgdata:
